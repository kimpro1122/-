<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정사각형 텍스트 이미지 생성기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f6f8;
      color: #111827;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      min-height: 100vh;
    }
    .panel, .preview-box {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      padding: 20px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.35;
    }
    .desc {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.6;
      color: #4b5563;
    }
    .group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    textarea, input, select, button {
      font: inherit;
    }
    textarea, input[type="number"], select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }
    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    .swatch-group {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .swatch {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      border: 2px solid #d1d5db;
      cursor: pointer;
      padding: 0;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      appearance: none;
      -webkit-appearance: none;
    }
    .swatch:hover { transform: translateY(-1px); }
    .swatch.active {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17,24,39,0.12);
    }
    .swatch.white { border-color: #9ca3af; }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    .action-btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #111827;
      color: #fff;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .preview-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .preview-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .meta {
      font-size: 13px;
      color: #4b5563;
    }
    .canvas-wrap {
      width: min(100%, 760px);
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }
    .footer-note {
      width: 100%;
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }
    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>정사각형 텍스트 이미지 생성기</h1>
      <p class="desc">텍스트를 입력하면 단색 배경 위에 가운데 정렬로 배치된 정사각형 이미지를 만들고, 저용량 JPG 파일로 저장할 수 있습니다.</p>

      <div class="group">
        <label for="textInput">텍스트 입력</label>
        <textarea id="textInput" placeholder="여기에 문구를 입력하세요.
엔터로 줄바꿈할 수 있습니다.">안녕하세요
정사각형 텍스트 이미지입니다</textarea>
        <div class="hint">엔터 입력 시 줄바꿈이 그대로 반영됩니다.</div>
      </div>

      <div class="row">
        <div class="group">
          <label for="canvasSize">캔버스 크기(px)</label>
          <input id="canvasSize" type="number" min="200" max="4000" step="10" value="1080" />
          <div class="hint">예: 800, 1080, 1600</div>
        </div>
        <div class="group">
          <label for="jpgQuality">JPG 품질</label>
          <select id="jpgQuality">
            <option value="0.6">낮음 (더 가벼움)</option>
            <option value="0.75" selected>중간 (권장)</option>
            <option value="0.85">높음</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>배경색</label>
          <div class="swatch-group" id="bgSwatches">
            <button type="button" class="swatch active" data-color="#111111" style="background:#111111"></button>
            <button type="button" class="swatch white" data-color="#ffffff" style="background:#ffffff"></button>
            <button type="button" class="swatch" data-color="#ef4444" style="background:#ef4444"></button>
            <button type="button" class="swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
            <button type="button" class="swatch" data-color="#eab308" style="background:#eab308"></button>
            <button type="button" class="swatch" data-color="#22c55e" style="background:#22c55e"></button>
            <button type="button" class="swatch" data-color="#06b6d4" style="background:#06b6d4"></button>
            <button type="button" class="swatch" data-color="#3b82f6" style="background:#3b82f6"></button>
            <button type="button" class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
            <button type="button" class="swatch" data-color="#ec4899" style="background:#ec4899"></button>
          </div>
        </div>
        <div class="group">
          <label>글자색</label>
          <div class="swatch-group" id="textSwatches">
            <button type="button" class="swatch" data-color="#111111" style="background:#111111"></button>
            <button type="button" class="swatch white active" data-color="#ffffff" style="background:#ffffff"></button>
            <button type="button" class="swatch" data-color="#ef4444" style="background:#ef4444"></button>
            <button type="button" class="swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
            <button type="button" class="swatch" data-color="#eab308" style="background:#eab308"></button>
            <button type="button" class="swatch" data-color="#22c55e" style="background:#22c55e"></button>
            <button type="button" class="swatch" data-color="#06b6d4" style="background:#06b6d4"></button>
            <button type="button" class="swatch" data-color="#3b82f6" style="background:#3b82f6"></button>
            <button type="button" class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
            <button type="button" class="swatch" data-color="#ec4899" style="background:#ec4899"></button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="paddingRatio">내부 여백</label>
          <select id="paddingRatio">
            <option value="0.10">좁게</option>
            <option value="0.14" selected>보통</option>
            <option value="0.18">넓게</option>
          </select>
        </div>
        <div class="group">
          <label for="fontWeight">글자 두께</label>
          <select id="fontWeight">
            <option value="400">보통</option>
            <option value="500" selected>중간</option>
            <option value="700">굵게</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <button type="button" class="action-btn secondary" id="renderBtn">미리보기 갱신</button>
        <button type="button" class="action-btn primary" id="downloadBtn">JPG 저장</button>
      </div>
    </section>

    <section class="preview-box">
      <div class="preview-header">
        <strong>미리보기</strong>
        <span class="meta" id="metaText">1080 × 1080 JPG</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="canvas" width="1080" height="1080"></canvas>
      </div>
      <div class="footer-note">긴 문장은 자동 줄바꿈과 글자 크기 축소가 함께 적용됩니다.</div>
    </section>
  </div>

  <script>
    var textInput = document.getElementById('textInput');
    var canvasSizeInput = document.getElementById('canvasSize');
    var jpgQualitySelect = document.getElementById('jpgQuality');
    var bgSwatches = document.getElementById('bgSwatches');
    var textSwatches = document.getElementById('textSwatches');
    var paddingRatioSelect = document.getElementById('paddingRatio');
    var fontWeightSelect = document.getElementById('fontWeight');
    var renderBtn = document.getElementById('renderBtn');
    var downloadBtn = document.getElementById('downloadBtn');
    var metaText = document.getElementById('metaText');
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');

    var selectedBgColor = '#111111';
    var selectedTextColor = '#ffffff';

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyCanvasSize() {
      var safeSize = clamp(parseInt(canvasSizeInput.value, 10) || 1080, 200, 4000);
      canvas.width = safeSize;
      canvas.height = safeSize;
      metaText.textContent = safeSize + ' × ' + safeSize + ' JPG';
      return safeSize;
    }

    function getWrappedLines(text, maxWidth, fontWeight, fontSize) {
      ctx.font = fontWeight + ' ' + fontSize + 'px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
      var paragraphs = String(text || '').replace(/\r\n/g, '\n').split('\n');
      var lines = [];

      for (var p = 0; p < paragraphs.length; p++) {
        var paragraph = paragraphs[p];
        if (paragraph === '') {
          lines.push('');
        } else {
          var current = '';
          var chars = Array.from(paragraph);
          for (var i = 0; i < chars.length; i++) {
            var ch = chars[i];
            var test = current + ch;
            if (ctx.measureText(test).width <= maxWidth || current === '') {
              current = test;
            } else {
              lines.push(current);
              current = ch;
            }
          }
          if (current !== '') lines.push(current);
        }
        if (p < paragraphs.length - 1) lines.push('__BREAK__');
      }
      return lines;
    }

    function fitText(text, size, paddingRatio, fontWeight) {
      var padding = size * paddingRatio;
      var maxWidth = size - padding * 2;
      var maxHeight = size - padding * 2;
      var fontSize = Math.floor(size * 0.24);
      var minFontSize = 18;

      while (fontSize >= minFontSize) {
        var lineHeight = Math.max(fontSize, Math.round(fontSize * 1.05));
        var rawLines = getWrappedLines(text, maxWidth, fontWeight, fontSize);
        var totalHeight = rawLines.length * lineHeight;
        if (totalHeight <= maxHeight) {
          return {
            fontSize: fontSize,
            lineHeight: lineHeight,
            rawLines: rawLines,
            totalHeight: totalHeight
          };
        }
        fontSize -= 1;
      }

      var finalLines = getWrappedLines(text, maxWidth, fontWeight, minFontSize);
      var finalLineHeight = Math.max(minFontSize, Math.round(minFontSize * 1.05));
      return {
        fontSize: minFontSize,
        lineHeight: finalLineHeight,
        rawLines: finalLines,
        totalHeight: finalLines.length * finalLineHeight
      };
    }

    function draw() {
      var size = applyCanvasSize();
      var text = textInput.value && textInput.value.length ? textInput.value : ' ';
      var paddingRatio = parseFloat(paddingRatioSelect.value || '0.14');
      var fontWeight = fontWeightSelect.value || '500';

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = selectedBgColor;
      ctx.fillRect(0, 0, size, size);

      var fit = fitText(text, size, paddingRatio, fontWeight);
      ctx.font = fontWeight + ' ' + fit.fontSize + 'px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
      ctx.fillStyle = selectedTextColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      var currentY = size / 2 - fit.totalHeight / 2 + fit.lineHeight / 2;

      for (var i = 0; i < fit.rawLines.length; i++) {
        var line = fit.rawLines[i];
        if (line === '__BREAK__') {
          currentY += fit.lineHeight;
        } else {
          ctx.fillText(line, size / 2, currentY);
          currentY += fit.lineHeight;
        }
      }
    }

    function downloadJpg() {
      draw();
      var quality = parseFloat(jpgQualitySelect.value || '0.75');
      var dataUrl = canvas.toDataURL('image/jpeg', quality);
      var link = document.createElement('a');
      var stamp = new Date().toISOString().replace(/[:.]/g, '-');
      link.href = dataUrl;
      link.download = 'square-text-image-' + canvas.width + 'x' + canvas.height + '-' + stamp + '.jpg';
      link.click();
    }

    function bindSwatches(container, target) {
      var buttons = container.querySelectorAll('.swatch');
      for (var i = 0; i < buttons.length; i++) {
        (function (button, allButtons) {
          button.addEventListener('click', function () {
            for (var j = 0; j < allButtons.length; j++) {
              allButtons[j].classList.remove('active');
            }
            button.classList.add('active');
            var color = button.getAttribute('data-color');
            if (target === 'bg') selectedBgColor = color;
            if (target === 'text') selectedTextColor = color;
            draw();
          });
        })(buttons[i], buttons);
      }
    }

    textInput.addEventListener('input', draw);
    canvasSizeInput.addEventListener('input', draw);
    jpgQualitySelect.addEventListener('change', draw);
    paddingRatioSelect.addEventListener('change', draw);
    fontWeightSelect.addEventListener('change', draw);
    renderBtn.addEventListener('click', draw);
    downloadBtn.addEventListener('click', downloadJpg);

    bindSwatches(bgSwatches, 'bg');
    bindSwatches(textSwatches, 'text');

    draw();
  </script>
</body>
</html>
