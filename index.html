<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정사각형 텍스트 이미지 생성기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f6f8;
      color: #1f2937;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      min-height: 100vh;
    }

    .panel,
    .preview-box {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      line-height: 1.35;
    }

    .desc {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.6;
      color: #4b5563;
    }

    .group { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    textarea,
    input,
    select,
    button {
      font-family: inherit;
    }

    textarea,
    input[type="number"],
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      background: #ffffff;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    .swatch-group {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .swatch {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      border: 2px solid #d1d5db;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      background-clip: padding-box;
    }

    .swatch:hover { transform: translateY(-1px); }

    .swatch.active {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.12);
    }

    .swatch.white {
      border-color: #9ca3af;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .action-btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }

    .primary {
      background: #111827;
      color: #ffffff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .preview-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .preview-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .meta {
      font-size: 13px;
      color: #4b5563;
    }

    .canvas-wrap {
      width: min(100%, 760px);
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .footer-note {
      width: 100%;
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>정사각형 텍스트 이미지 생성기</h1>
      <p class="desc">텍스트를 입력하면 단색 배경 위에 가운데 정렬로 배치된 정사각형 이미지를 만들고, 저용량 JPG 파일로 저장할 수 있습니다. 입력 중 엔터로 줄바꿈할 수 있으며, 내용이 길어지면 글자 크기가 자동 조절됩니다.</p>

      <div class="group">
        <label for="textInput">텍스트 입력</label>
        <textarea id="textInput" placeholder="여기에 문구를 입력하세요.
엔터로 줄바꿈할 수 있습니다.">안녕하세요
정사각형 텍스트 이미지입니다</textarea>
        <div class="hint">엔터 입력 시 줄바꿈이 그대로 반영됩니다.</div>
      </div>

      <div class="row">
        <div class="group">
          <label for="canvasSize">캔버스 크기(px)</label>
          <input id="canvasSize" type="number" min="200" max="4000" step="10" value="1080" />
          <div class="hint">예: 800, 1080, 1600</div>
        </div>
        <div class="group">
          <label for="jpgQuality">JPG 품질</label>
          <select id="jpgQuality">
            <option value="0.6">낮음 (더 가벼움)</option>
            <option value="0.75" selected>중간 (권장)</option>
            <option value="0.85">높음</option>
          </select>
          <div class="hint">품질이 낮을수록 파일 용량이 더 줄어듭니다.</div>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>배경색</label>
          <div class="swatch-group" id="bgSwatches">
            <button type="button" class="swatch active" data-color="#111111" style="background:#111111" aria-label="배경색 검은색"></button>
            <button type="button" class="swatch white" data-color="#ffffff" style="background:#ffffff" aria-label="배경색 흰색"></button>
            <button type="button" class="swatch" data-color="#ef4444" style="background:#ef4444" aria-label="배경색 빨간색"></button>
            <button type="button" class="swatch" data-color="#f59e0b" style="background:#f59e0b" aria-label="배경색 주황색"></button>
            <button type="button" class="swatch" data-color="#eab308" style="background:#eab308" aria-label="배경색 노란색"></button>
            <button type="button" class="swatch" data-color="#22c55e" style="background:#22c55e" aria-label="배경색 초록색"></button>
            <button type="button" class="swatch" data-color="#06b6d4" style="background:#06b6d4" aria-label="배경색 민트색"></button>
            <button type="button" class="swatch" data-color="#3b82f6" style="background:#3b82f6" aria-label="배경색 파란색"></button>
            <button type="button" class="swatch" data-color="#8b5cf6" style="background:#8b5cf6" aria-label="배경색 보라색"></button>
            <button type="button" class="swatch" data-color="#ec4899" style="background:#ec4899" aria-label="배경색 핑크색"></button>
          </div>
        </div>
        <div class="group">
          <label>글자색</label>
          <div class="swatch-group" id="textSwatches">
            <button type="button" class="swatch" data-color="#111111" style="background:#111111" aria-label="글자색 검은색"></button>
            <button type="button" class="swatch white active" data-color="#ffffff" style="background:#ffffff" aria-label="글자색 흰색"></button>
            <button type="button" class="swatch" data-color="#ef4444" style="background:#ef4444" aria-label="글자색 빨간색"></button>
            <button type="button" class="swatch" data-color="#f59e0b" style="background:#f59e0b" aria-label="글자색 주황색"></button>
            <button type="button" class="swatch" data-color="#eab308" style="background:#eab308" aria-label="글자색 노란색"></button>
            <button type="button" class="swatch" data-color="#22c55e" style="background:#22c55e" aria-label="글자색 초록색"></button>
            <button type="button" class="swatch" data-color="#06b6d4" style="background:#06b6d4" aria-label="글자색 민트색"></button>
            <button type="button" class="swatch" data-color="#3b82f6" style="background:#3b82f6" aria-label="글자색 파란색"></button>
            <button type="button" class="swatch" data-color="#8b5cf6" style="background:#8b5cf6" aria-label="글자색 보라색"></button>
            <button type="button" class="swatch" data-color="#ec4899" style="background:#ec4899" aria-label="글자색 핑크색"></button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="paddingRatio">내부 여백</label>
          <select id="paddingRatio">
            <option value="0.10">좁게</option>
            <option value="0.14" selected>보통</option>
            <option value="0.18">넓게</option>
          </select>
        </div>
        <div class="group">
          <label for="fontWeight">글자 두께</label>
          <select id="fontWeight">
            <option value="400">보통</option>
            <option value="500" selected>중간</option>
            <option value="700">굵게</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <button type="button" class="action-btn secondary" id="renderBtn">미리보기 갱신</button>
        <button type="button" class="action-btn primary" id="downloadBtn">JPG 저장</button>
      </div>
    </section>

    <section class="preview-box">
      <div class="preview-header">
        <strong>미리보기</strong>
        <span class="meta" id="metaText">1080 × 1080 JPG</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="canvas" width="1080" height="1080"></canvas>
      </div>
      <div class="footer-note">
        긴 문장은 자동 줄바꿈과 글자 크기 축소가 함께 적용됩니다. 사용자가 직접 입력한 엔터 줄바꿈도 유지됩니다.
      </div>
    </section>
  </div>

  <script>
    const textInput = document.getElementById('textInput');
    const canvasSizeInput = document.getElementById('canvasSize');
    const jpgQualitySelect = document.getElementById('jpgQuality');
    const bgSwatches = document.getElementById('bgSwatches');
    const textSwatches = document.getElementById('textSwatches');
    const paddingRatioSelect = document.getElementById('paddingRatio');
    const fontWeightSelect = document.getElementById('fontWeight');
    const renderBtn = document.getElementById('renderBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const metaText = document.getElementById('metaText');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let selectedBgColor = '#111111';
    let selectedTextColor = '#ffffff';

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyCanvasSize(sizeValue) {
      const safeSize = clamp(parseInt(sizeValue, 10) || 1080, 200, 4000);
      canvas.width = safeSize;
      canvas.height = safeSize;
      metaText.textContent = safeSize + ' × ' + safeSize + ' JPG';
      return safeSize;
    }

    function wrapParagraph(paragraph, maxWidth) {
      if (!paragraph) return [''];

      const lines = [];
      let current = '';
      const chars = Array.from(paragraph);

      for (const ch of chars) {
        const test = current + ch;
        if (ctx.measureText(test).width <= maxWidth || current.length === 0) {
          current = test;
        } else {
          lines.push(current);
          current = ch;
        }
      }

      if (current) lines.push(current);
      return lines;
    }

    function getWrappedLines(text, maxWidth) {
      const paragraphs = String(text).replace(/
/g, '
').split('
');
      const lines = [];

      paragraphs.forEach((paragraph, index) => {
        const wrapped = wrapParagraph(paragraph, maxWidth);
        lines.push.apply(lines, wrapped);
        if (index < paragraphs.length - 1) lines.push('__BREAK__');
      });

      return lines;
    }

    function fitText(text, size, paddingRatio, fontWeight) {
      const padding = size * paddingRatio;
      const maxWidth = size - padding * 2;
      const maxHeight = size - padding * 2;
      let fontSize = Math.floor(size * 0.24);
      const minFontSize = 18;

      while (fontSize >= minFontSize) {
        const lineHeight = Math.round(fontSize * 1.35);
        ctx.font = fontWeight + ' ' + fontSize + "px 'Noto Sans KR', sans-serif";

        const rawLines = getWrappedLines(text, maxWidth);
        const breakCount = rawLines.filter(line => line === '__BREAK__').length;
        const visibleLines = rawLines.filter(line => line !== '__BREAK__');
        const totalLineSlots = visibleLines.length + breakCount;
        const totalHeight = totalLineSlots * lineHeight;
        const tooWide = visibleLines.some(line => ctx.measureText(line).width > maxWidth + 1);

        if (!tooWide && totalHeight <= maxHeight) {
          return {
            fontSize,
            lineHeight,
            rawLines,
            totalHeight
          };
        }

        fontSize -= 1;
      }

      const fallbackFontSize = minFontSize;
      const fallbackLineHeight = Math.round(fallbackFontSize * 1.35);
      ctx.font = fontWeight + ' ' + fallbackFontSize + "px 'Noto Sans KR', sans-serif";
      const rawLines = getWrappedLines(text, maxWidth);
      const breakCount = rawLines.filter(line => line === '__BREAK__').length;
      const visibleLines = rawLines.filter(line => line !== '__BREAK__');
      const totalLineSlots = visibleLines.length + breakCount;
      const totalHeight = totalLineSlots * fallbackLineHeight;

      return {
        fontSize: fallbackFontSize,
        lineHeight: fallbackLineHeight,
        rawLines,
        totalHeight
      };
    }

    function draw() {
      const size = applyCanvasSize(canvasSizeInput.value);
      const paddingRatio = parseFloat(paddingRatioSelect.value);
      const fontWeight = fontWeightSelect.value;
      const text = textInput.value && textInput.value.length ? textInput.value : ' ';

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = selectedBgColor;
      ctx.fillRect(0, 0, size, size);

      const fit = fitText(text, size, paddingRatio, fontWeight);
      ctx.font = fontWeight + ' ' + fit.fontSize + "px 'Noto Sans KR', sans-serif";
      ctx.fillStyle = selectedTextColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      let currentY = size / 2 - fit.totalHeight / 2 + fit.lineHeight / 2;

      fit.rawLines.forEach(line => {
        if (line === '__BREAK__') {
          currentY += fit.lineHeight;
          return;
        }
        ctx.fillText(line, size / 2, currentY);
        currentY += fit.lineHeight;
      });
    }

    function downloadJpg() {
      draw();
      const quality = parseFloat(jpgQualitySelect.value);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const link = document.createElement('a');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      link.href = dataUrl;
      link.download = 'square-text-image-' + canvas.width + 'x' + canvas.height + '-' + stamp + '.jpg';
      link.click();
    }

    function bindSwatches(container, target) {
      const buttons = container.querySelectorAll('.swatch');
      buttons.forEach(button => {
        button.addEventListener('click', () => {
          buttons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          const color = button.getAttribute('data-color');
          if (target === 'bg') selectedBgColor = color;
          if (target === 'text') selectedTextColor = color;
          draw();
        });
      });
    }

    [textInput, canvasSizeInput, jpgQualitySelect, paddingRatioSelect, fontWeightSelect].forEach(el => {
      el.addEventListener('input', draw);
      el.addEventListener('change', draw);
    });

    bindSwatches(bgSwatches, 'bg');
    bindSwatches(textSwatches, 'text');
    renderBtn.addEventListener('click', draw);
    downloadBtn.addEventListener('click', downloadJpg);

    window.addEventListener('load', () => {
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(draw);
      } else {
        draw();
      }
    });
  </script>
</body>
</html>
